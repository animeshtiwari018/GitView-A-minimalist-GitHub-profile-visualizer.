<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <a class="logo" href="#">
        <span>GH</span>
        GitHub Finder
      </a>
      <div class="header-actions">
        <nav aria-level="Primary Navigation">
          <a href="#">Explore</a>
          <a href="#">MarketPlace</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <h1>Search Github-style accounts in one place.</h1>
        <p>
          Enter a Username to preview public Github repositories. This fetch
          user data from Github orginial API.
        </p>

        <div class="search-pannel">
          <form id="searchForm">
            <input
              id="usernameinput"
              type="text"
              name="Username"
              placeholder="Enter Github Username"
              autocomplete="off"
            />
            <button id="searchButton" type="button">Search</button>
          </form>
        </div>
      </section>

      <section class="profile-section">
        <div id="repoContainer" class="profile-card-placeholder">
          <div class="repo-empty">
            <h2 class="placeholder">Github profile preview</h2>
            <p>Search a user to view profile repository info.</p>
          </div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
